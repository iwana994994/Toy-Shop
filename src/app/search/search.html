<form class="filter-form">
  <mat-form-field appearance="outline">
    <mat-label>Tip igračke</mat-label>
    <mat-select name="type" [(ngModel)]="type">
      <mat-option value="">Svi tipovi</mat-option>
      @for (t of types; track t) {
        <mat-option [value]="t">{{ t }}</mat-option>
      }
    </mat-select>
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Grupa dece</mat-label>
    <mat-select name="group" [(ngModel)]="selectedGroup">
      @for (t of Group; track t) {
        <mat-option [value]="t">{{ t }}</mat-option>
      }
    </mat-select>
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Uzrast</mat-label>
    <mat-select name="age" [(ngModel)]="selectedAge">
      <mat-option value="">Svi uzrasti</mat-option>
      @for (t of age; track t) {
        <mat-option [value]="t">{{ t }}</mat-option>
      }
    </mat-select>
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Minimalna ocena  ★ ★ ★</mat-label>
    <mat-select name="minRating" [(ngModel)]="minRating">
      <mat-option [value]="0">Sve ocene</mat-option>
      <mat-option [value]="1">1+ ★</mat-option>
      <mat-option [value]="2">2+ ★</mat-option>
      <mat-option [value]="3">3+ ★</mat-option>
      <mat-option [value]="4">4+ ★</mat-option>
      <mat-option [value]="5">5 ★</mat-option>
    </mat-select>
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Cena od</mat-label>
    <input matInput type="number" name="from" [(ngModel)]="from">
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Cena do</mat-label>
    <input matInput type="number" name="to" [(ngModel)]="to">
  </mat-form-field>

  <button mat-stroked-button type="button" (click)="reset()">Reset</button>
  <button mat-raised-button type="button" (click)="search()">Pretraži</button>
</form>
